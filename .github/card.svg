<svg width="360" height="220" viewBox="0 0 520 320" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Netanel Shen – GitHub Profile Card</title>
  <desc>Animated profile card for Netanel Shen, SOC Engineer and backend developer</desc>

  <defs>
    <clipPath id="clip-name"><rect x="110" y="38" width="0" height="26"><animate attributeName="width" from="0" to="250" dur="0.6s" begin="0.4s" fill="freeze"/></rect></clipPath>
    <clipPath id="clip-sub1"><rect x="110" y="60" width="0" height="18"><animate attributeName="width" from="0" to="180" dur="0.4s" begin="1.0s" fill="freeze"/></rect></clipPath>
    <clipPath id="clip-sub2"><rect x="110" y="76" width="0" height="18"><animate attributeName="width" from="0" to="330" dur="0.5s" begin="1.4s" fill="freeze"/></rect></clipPath>

    <clipPath id="clip-prompt1"><rect x="28" y="112" width="0" height="16"><animate attributeName="width" from="0" to="210" dur="0.4s" begin="1.0s" fill="freeze"/></rect></clipPath>

    <clipPath id="clip-brace1"><rect x="28" y="128" width="0" height="16"><animate attributeName="width" from="0" to="16" dur="0.1s" begin="1.5s" fill="freeze"/></rect></clipPath>
    <clipPath id="clip-l1"><rect x="38" y="144" width="0" height="16"><animate attributeName="width" from="0" to="310" dur="0.5s" begin="1.6s" fill="freeze"/></rect></clipPath>
    <clipPath id="clip-l2"><rect x="38" y="160" width="0" height="16"><animate attributeName="width" from="0" to="310" dur="0.5s" begin="2.2s" fill="freeze"/></rect></clipPath>
    <clipPath id="clip-l3"><rect x="38" y="176" width="0" height="16"><animate attributeName="width" from="0" to="280" dur="0.5s" begin="2.8s" fill="freeze"/></rect></clipPath>
    <clipPath id="clip-l4"><rect x="38" y="192" width="0" height="16"><animate attributeName="width" from="0" to="290" dur="0.5s" begin="3.4s" fill="freeze"/></rect></clipPath>
    <clipPath id="clip-brace2"><rect x="28" y="208" width="0" height="16"><animate attributeName="width" from="0" to="16" dur="0.1s" begin="4.0s" fill="freeze"/></rect></clipPath>

    <clipPath id="clip-prompt2"><rect x="295" y="112" width="0" height="16"><animate attributeName="width" from="0" to="180" dur="0.4s" begin="1.0s" fill="freeze"/></rect></clipPath>

    <clipPath id="clip-stat1-lbl"><rect x="295" y="132" width="0" height="16"><animate attributeName="width" from="0" to="120" dur="0.3s" begin="1.6s" fill="freeze"/></rect></clipPath>
    <clipPath id="clip-stat2-lbl"><rect x="295" y="162" width="0" height="16"><animate attributeName="width" from="0" to="70" dur="0.3s" begin="2.2s" fill="freeze"/></rect></clipPath>
    <clipPath id="clip-stat3-lbl"><rect x="295" y="192" width="0" height="16"><animate attributeName="width" from="0" to="130" dur="0.3s" begin="2.8s" fill="freeze"/></rect></clipPath>
    <clipPath id="clip-stat4-lbl"><rect x="295" y="222" width="0" height="16"><animate attributeName="width" from="0" to="70" dur="0.3s" begin="3.4s" fill="freeze"/></rect></clipPath>

    <clipPath id="clip-prompt3"><rect x="28" y="244" width="0" height="16"><animate attributeName="width" from="0" to="150" dur="0.4s" begin="4.2s" fill="freeze"/></rect></clipPath>

    <clipPath id="clip-footer"><rect x="28" y="298" width="0" height="18"><animate attributeName="width" from="0" to="440" dur="0.5s" begin="5.5s" fill="freeze"/></rect></clipPath>
  </defs>

  <!-- Background -->
  <rect width="520" height="320" rx="10" fill="#0d1117"/>

  <!-- Grid lines -->
  <g stroke="#1dba8a" stroke-width="0.3" opacity="0.07">
    <line x1="0" y1="50" x2="520" y2="50"/>
    <line x1="0" y1="100" x2="520" y2="100"/>
    <line x1="0" y1="150" x2="520" y2="150"/>
    <line x1="0" y1="200" x2="520" y2="200"/>
    <line x1="0" y1="250" x2="520" y2="250"/>
    <line x1="0" y1="300" x2="520" y2="300"/>
    <line x1="130" y1="0" x2="130" y2="320"/>
    <line x1="260" y1="0" x2="260" y2="320"/>
    <line x1="390" y1="0" x2="390" y2="320"/>
  </g>

  <!-- Border -->
  <rect x="8" y="8" width="504" height="304" rx="7" fill="none" stroke="#1dba8a" stroke-width="1" opacity="0">
    <animate attributeName="opacity" from="0" to="0.35" dur="0.5s" begin="0.1s" fill="freeze"/>
  </rect>

  <!-- Corner accents -->
  <g fill="none" stroke="#1dba8a" stroke-width="1.5" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.2s" fill="freeze"/>
    <path d="M16 38 L16 16 L38 16"/>
    <path d="M484 38 L484 16 L462 16"/>
    <path d="M16 282 L16 304 L38 304"/>
    <path d="M484 282 L484 304 L462 304"/>
  </g>

  <!-- Avatar -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.2s" fill="freeze"/>
    <circle cx="62" cy="68" r="30" fill="#0f3d2e" stroke="#1dba8a" stroke-width="1"/>
    <text x="62" y="74" text-anchor="middle" fill="#1dba8a" font-family="'Fira Code',monospace" font-size="16" font-weight="700">NS</text>
    <circle cx="86" cy="46" r="5" fill="#1dba8a"/>
    <circle cx="86" cy="46" r="2.5" fill="#0d1117"/>
  </g>

  <!-- Name typewriter -->
  <g clip-path="url(#clip-name)">
    <text x="110" y="56" fill="#1dba8a" font-family="'Fira Code',monospace" font-size="17" font-weight="700">Netanel Shen</text>
  </g>
  <g clip-path="url(#clip-sub1)">
    <text x="110" y="72" fill="#8b949e" font-family="'Fira Code',monospace" font-size="11">@Netanel-Shen</text>
  </g>
  <g clip-path="url(#clip-sub2)">
    <text x="110" y="86" fill="#8b949e" font-family="'Fira Code',monospace" font-size="10">Cyber Security · Backend Dev · Israel</text>
  </g>

  <!-- Divider 1 -->
  <line x1="28" y1="102" x2="492" y2="102" stroke="#1dba8a" stroke-width="0.5" opacity="0">
    <animate attributeName="opacity" from="0" to="0.3" dur="0.3s" begin="0.9s" fill="freeze"/>
  </line>

  <!-- Terminal prompt left -->
  <g clip-path="url(#clip-prompt1)">
    <text x="28" y="122" fill="#1dba8a" font-family="'Fira Code',monospace" font-size="10">~/about $ cat profile.json</text>
  </g>

  <!-- JSON block -->
  <g clip-path="url(#clip-brace1)">
    <text x="26" y="138" fill="#8b949e" font-family="'Fira Code',monospace" font-size="10">{</text>
  </g>
  <g clip-path="url(#clip-l1)">
    <text x="38" y="154" fill="#8b949e" font-family="'Fira Code',monospace" font-size="10">"role":<tspan fill="#e6edf3">"Software Engineer → Cyber Security",</tspan></text>
  </g>
  <g clip-path="url(#clip-l2)">
    <text x="38" y="170" fill="#8b949e" font-family="'Fira Code',monospace" font-size="10">"focus":<tspan fill="#e6edf3">["SOC", "Malware Analysis", "Python"],</tspan></text>
  </g>
  <g clip-path="url(#clip-l3)">
    <text x="38" y="186" fill="#8b949e" font-family="'Fira Code',monospace" font-size="10">"currently":<tspan fill="#e6edf3">"Exploring all things Cyber",</tspan></text>
  </g>
  <g clip-path="url(#clip-l4)">
    <text x="38" y="202" fill="#8b949e" font-family="'Fira Code',monospace" font-size="10">"motto":<tspan fill="#1dba8a">"Build it. Break it. Secure it."</tspan></text>
  </g>
  <g clip-path="url(#clip-brace2)">
    <text x="28" y="218" fill="#8b949e" font-family="'Fira Code',monospace" font-size="10">}</text>
  </g>

  <!-- Vertical divider -->
  <line x1="290" y1="108" x2="286" y2="238" stroke="#1dba8a" stroke-width="0.5" opacity="0">
    <animate attributeName="opacity" from="0" to="0.3" dur="0.3s" begin="0.9s" fill="freeze"/>
  </line>

  <!-- Stats prompt -->
  <g clip-path="url(#clip-prompt2)">
    <text x="295" y="122" fill="#1dba8a" font-family="'Fira Code',monospace" font-size="10">~/stats $ ./summary</text>
  </g>

  <!-- Stat 1 -->
  <g clip-path="url(#clip-stat1-lbl)">
    <text x="295" y="138" fill="#8b949e" font-family="'Fira Code',monospace" font-size="8">commits 2026</text>
  </g>
  <rect x="295" y="140" width="178" height="5" rx="2.5" fill="#1c2128" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.2s" begin="1.7s" fill="freeze"/>
  </rect>
  <rect x="295" y="140" width="0" height="5" rx="2.5" fill="#1dba8a">
    <animate attributeName="width" from="0" to="89" dur="0.6s" begin="1.8s" fill="freeze"/>
  </rect>
  <text x="480" y="148" fill="#8b949e" font-family="'Fira Code',monospace" font-size="10" text-anchor="end" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.2s" begin="2.1s" fill="freeze"/>30</text>

  <!-- Stat 2 -->
  <g clip-path="url(#clip-stat2-lbl)">
    <text x="295" y="167" fill="#8b949e" font-family="'Fira Code',monospace" font-size="8">repos</text>
  </g>
  <rect x="295" y="170" width="178" height="5" rx="2.5" fill="#1c2128" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.2s" begin="2.3s" fill="freeze"/>
  </rect>
  <rect x="295" y="170" width="0" height="5" rx="2.5" fill="#1dba8a">
    <animate attributeName="width" from="0" to="36" dur="0.6s" begin="2.4s" fill="freeze"/>
  </rect>
  <text x="480" y="178" fill="#8b949e" font-family="'Fira Code',monospace" font-size="10" text-anchor="end" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.2s" begin="2.7s" fill="freeze"/>4</text>

  <!-- Stat 3 -->
  <g clip-path="url(#clip-stat3-lbl)">
    <text x="295" y="197" fill="#8b949e" font-family="'Fira Code',monospace" font-size="8">contributions</text>
  </g>
  <rect x="295" y="200" width="178" height="5" rx="2.5" fill="#1c2128" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.2s" begin="2.9s" fill="freeze"/>
  </rect>
  <rect x="295" y="200" width="0" height="5" rx="2.5" fill="#1dba8a">
    <animate attributeName="width" from="0" to="130" dur="0.6s" begin="3.0s" fill="freeze"/>
  </rect>
  <text x="480" y="208" fill="#8b949e" font-family="'Fira Code',monospace" font-size="10" text-anchor="end" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.2s" begin="3.3s" fill="freeze"/>58</text>

  <!-- Stat 4 -->
  <g clip-path="url(#clip-stat4-lbl)">
    <text x="295" y="227" fill="#8b949e" font-family="'Fira Code',monospace" font-size="8">streak</text>
  </g>
  <rect x="295" y="230" width="178" height="5" rx="2.5" fill="#1c2128" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.2s" begin="3.5s" fill="freeze"/>
  </rect>
  <rect x="295" y="230" width="0" height="5" rx="2.5" fill="#1dba8a">
    <animate attributeName="width" from="0" to="18" dur="0.6s" begin="3.6s" fill="freeze"/>
  </rect>
  <text x="480" y="238" fill="#8b949e" font-family="'Fira Code',monospace" font-size="10" text-anchor="end" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.2s" begin="3.9s" fill="freeze"/>1d</text>

  <!-- Divider 2 -->
  <line x1="28" y1="238" x2="492" y2="238" stroke="#1dba8a" stroke-width="0.5" opacity="0">
    <animate attributeName="opacity" from="0" to="0.3" dur="0.3s" begin="4.1s" fill="freeze"/>
  </line>

  <!-- Stack prompt -->
  <g clip-path="url(#clip-prompt3)">
    <text x="28" y="254" fill="#1dba8a" font-family="'Fira Code',monospace" font-size="10">~/stack $ ls -la</text>
  </g>

  <!-- Tags -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.15s" begin="4.4s" fill="freeze"/>
    <rect x="28"  y="262" width="52" height="18" rx="3" fill="#0f3d2e"/>
    <text x="54"  y="275" fill="#1dba8a" font-family="'Fira Code',monospace" font-size="9" text-anchor="middle">Python</text>
  </g>
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.15s" begin="4.55s" fill="freeze"/>
    <rect x="86"  y="262" width="38" height="18" rx="3" fill="#0f3d2e"/>
    <text x="105" y="275" fill="#1dba8a" font-family="'Fira Code',monospace" font-size="9" text-anchor="middle">Java</text>
  </g>
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.15s" begin="4.7s" fill="freeze"/>
    <rect x="130" y="262" width="44" height="18" rx="3" fill="#0f3d2e"/>
    <text x="152" y="275" fill="#1dba8a" font-family="'Fira Code',monospace" font-size="9" text-anchor="middle">Docker</text>
  </g>
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.15s" begin="4.85s" fill="freeze"/>
    <rect x="180" y="262" width="40" height="18" rx="3" fill="#0f3d2e"/>
    <text x="200" y="275" fill="#1dba8a" font-family="'Fira Code',monospace" font-size="9" text-anchor="middle">Linux</text>
  </g>
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.15s" begin="5.0s" fill="freeze"/>
    <rect x="226" y="262" width="34" height="18" rx="3" fill="#0f3d2e"/>
    <text x="243" y="275" fill="#1dba8a" font-family="'Fira Code',monospace" font-size="9" text-anchor="middle">Git</text>
  </g>
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.15s" begin="5.15s" fill="freeze"/>
    <rect x="266" y="262" width="48" height="18" rx="3" fill="#0f3d2e"/>
    <text x="290" y="275" fill="#1dba8a" font-family="'Fira Code',monospace" font-size="9" text-anchor="middle">Cyber</text>
  </g>
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.15s" begin="5.3s" fill="freeze"/>
    <rect x="320" y="262" width="34" height="18" rx="3" fill="#0f3d2e"/>
    <text x="337" y="275" fill="#1dba8a" font-family="'Fira Code',monospace" font-size="9" text-anchor="middle">SOC</text>
  </g>
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.15s" begin="5.45s" fill="freeze"/>
    <rect x="360" y="262" width="38" height="18" rx="3" fill="#0f3d2e"/>
    <text x="379" y="275" fill="#1dba8a" font-family="'Fira Code',monospace" font-size="9" text-anchor="middle">Bash</text>
  </g>

  <!-- Blinking cursor -->
  <rect x="404" y="262" width="6" height="18" rx="1" fill="#1dba8a" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.1s" begin="5.6s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" begin="5.6s" repeatCount="indefinite"/>
  </rect>

  <!-- Footer -->
  <line x1="28" y1="292" x2="492" y2="292" stroke="#1dba8a" stroke-width="0.5" opacity="0">
    <animate attributeName="opacity" from="0" to="0.3" dur="0.3s" begin="5.5s" fill="freeze"/>
  </line>
  <g clip-path="url(#clip-footer)">
    <text x="28" y="308" fill="#8b949e" font-family="'Fira Code',monospace" font-size="10">github.com/Netanel-Shen</text>
  </g>
  <circle cx="478" cy="304" r="4" fill="#1dba8a" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="5.7s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0.2;1" dur="2s" begin="5.7s" repeatCount="indefinite"/>
  </circle>
  <text x="472" y="308" fill="#8b949e" font-family="'Fira Code',monospace" font-size="10" text-anchor="end" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="5.7s" fill="freeze"/>online</text>

</svg>
